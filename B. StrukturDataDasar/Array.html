<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>array konsep, operasi CRUD</h1>

    <script>
        //create
        let keranjangBuah = ["Apel", "Mangga", "Jeruk"];

        //Menambah Buah baru diposisi paling belakang (push)
        keranjangBuah.push("semangka");


        //read
        console.log(keranjangBuah[0]); //apel
        console.log(keranjangBuah);

        //update
        keranjangBuah[1] = "Pisang";
        console.log(keranjangBuah);

        //delete
        keranjangBuah.splice(2, 1); //menghapus jeruk
        keranjangBuah.pop(); //menghapus semangka
        console.log(keranjangBuah);
    </script>
</body>
</html>
